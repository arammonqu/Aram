<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aram's Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    <div class="background-glow glow-2"></div>
    
    <div class="container">
        <header>
            <div class="logo-area">
                <div class="logo-icon">A</div>
                <h1>Aram's <span>Website</span></h1>
            </div>
        </header>

        <main>
            <div class="section-title">
                <h2>Apps</h2>
                <div class="line"></div>
            </div>
            
            <div class="app-grid" id="app-grid">
                
                <!-- English Stories App Card -->
                <a href="Apps/English%20Stories/index.html" class="app-card">
                    <div class="card-glass"></div>
                    <div class="card-content">
                        <div class="app-icon" style="background: linear-gradient(135deg, #4ade80, #3b82f6);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
                        </div>
                        <div class="app-info">
                            <h3>English Stories</h3>
                            <p>Read and learn from interactive English stories.</p>
                        </div>
                        <div class="app-arrow">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </div>
                    </div>
                </a>

                <!-- English Learning App Card -->
                <a href="Apps/English%20Learning/index.html" class="app-card">
                    <div class="card-glass"></div>
                    <div class="card-content">
                        <div class="app-icon" style="background: linear-gradient(135deg, #a855f7, #6366f1);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>
                        </div>
                        <div class="app-info">
                            <h3>English Learning</h3>
                            <p>Master the English language with structured lessons.</p>
                        </div>
                        <div class="app-arrow">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </div>
                    </div>
                </a>

                <!-- English Videos App Card -->
                <a href="Apps/English%20Videos/index.html" class="app-card">
                    <div class="card-glass"></div>
                    <div class="card-content">
                        <div class="app-icon" style="background: linear-gradient(135deg, #f43f5e, #f97316);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.5" ry="2.5"></rect><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
                        </div>
                        <div class="app-info">
                            <h3>English Videos</h3>
                            <p>Watch and learn from curated English videos.</p>
                        </div>
                        <div class="app-arrow">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </div>
                    </div>
                </a>

            </div>

            <div class="section-title" style="margin-top: 3rem;">
                <h2>External Websites</h2>
                <div class="line"></div>
            </div>
            
            <div class="app-grid" id="external-grid">
                <!-- External websites will be injected here -->
            </div>
        </main>
    </div>

    <script>
        fetch('ExternalWebsites.txt')
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\n');
                const grid = document.getElementById('external-grid');
                lines.forEach(line => {
                    if (line.trim() === '') return;
                    const parts = line.split('|');
                    if (parts.length >= 2) {
                        const name = parts[0].trim();
                        const url = parts.slice(1).join('|').trim();
                        
                        const card = document.createElement('a');
                        card.href = url;
                        card.target = "_blank";
                        card.className = "app-card";
                        
                        card.innerHTML = `
                            <div class="card-glass"></div>
                            <div class="card-content">
                                <div class="app-icon" style="background: linear-gradient(135deg, #10b981, #059669);">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                                </div>
                                <div class="app-info">
                                    <h3>${name}</h3>
                                    <p>External Link</p>
                                </div>
                                <div class="app-arrow">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            })
            .catch(err => console.error('Error loading external websites:', err));
    </script>
</body>
</html>
